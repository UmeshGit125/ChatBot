  - '"Attendance".class_id -> "Class".id'
  - '"Class".subject_id -> "Subject".id'
  - '"Class".division_id -> "Division".id'
  - '"Class".teacher_id -> "Teacher".id'
  - '"Class".room_id -> "Room".id'
  - '"Scan".student_id -> "Student".id'
  - '"Scan".class_id -> "Class".id'
  - '"Scan".detected_beacon_id -> "Beacon".id'
  - '"Scan".scan_window_id -> "ScanWindow".id'
