# Common JOIN paths (for the LLM to reference)
# These are the most frequently needed multi-table paths:
common_paths:
  student_with_center_and_batch: |
    "Student" S
    JOIN "Batch" B ON S.batch_id = B.id
    JOIN "Center" C ON S.center_id = C.id
  
  student_attendance_with_class: |
    "Attendance" A
    JOIN "Student" S ON A.student_id = S.id
    JOIN "Class" Cl ON A.class_id = Cl.id
  
  student_exam_marks: |
    "StudentExamMarks" SEM
    JOIN "Student" S ON SEM.student_id = S.id
    JOIN "Exam" E ON SEM.exam_id = E.id
    JOIN "Subject" Sub ON SEM.subject_id = Sub.id
  
  student_semester: |
    "Student" S
    JOIN "Semester" Sm ON S.semester_id = Sm.id
  
  student_nth_semester: |
    "Student" S
    JOIN "Division" D ON S.division_id = D.id
    JOIN "Semester" Sm ON Sm.division_id = D.id AND Sm.number = N
  
  attendance_in_semester: |
    "Attendance" A
    JOIN "Student" S ON A.student_id = S.id
    JOIN "Class" Cl ON A.class_id = Cl.id
    JOIN "Semester" Sm ON Sm.division_id = S.division_id AND Sm.number = N
    WHERE Cl.start_date >= Sm.start_date AND (Sm.end_date IS NULL OR Cl.start_date <= Sm.end_date)
  
  student_submissions: |
    submission sub
    JOIN "Student" S ON sub.student_id = S.id
    JOIN problem p ON sub.problem_id = p.id
  
  club_members_with_center: |
    "ClubMember" CM
    JOIN "ClubCenter" CC ON CM.club_center_id = CC.id
    JOIN "Club" Cl ON CC.club_id = Cl.id
    JOIN "Center" C ON CC.center_id = C.id
    JOIN "Student" S ON CM.student_id = S.id
