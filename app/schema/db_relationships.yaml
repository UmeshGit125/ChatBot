# Complete database relationship graph (from Prisma schema via Metabase metadata)
# 116 FK relationships - tells the LLM exactly how to JOIN tables
# Format: "SourceTable".column -> "TargetTable".column

# Student relationships (core entity)
student_joins:
  - '"Student".center_id -> "Center".id'
  - '"Student".school_id -> "School".id'
  - '"Student".batch_id -> "Batch".id'
  - '"Student".semester_id -> "Semester".id'
  - '"Student".division_id -> "Division".id'
  - '"Student".cohort_id -> "Cohort".id'
  - '"Student".degree_id -> "ExternalDegree".id'

# Attendance & Class
attendance_joins:
