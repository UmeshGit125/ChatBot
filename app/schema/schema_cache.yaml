# Common query patterns
common_queries:
  student_count_by_center: |
    SELECT c.name as center_name, COUNT(s.id) as student_count
    FROM "Student" s JOIN "Center" c ON s.center_id = c.id
    WHERE s.is_active = true GROUP BY c.name ORDER BY student_count DESC
  find_student_by_name: |
    SELECT s.name, s.email, s.phone, c.name as center, b.name as batch
    FROM "Student" s
    JOIN "Center" c ON s.center_id = c.id
    JOIN "Batch" b ON s.batch_id = b.id
    WHERE s.name ILIKE '%NAME%'
  attendance_percentage: |
    SELECT s.name,
      COUNT(CASE WHEN a.status = 'PRESENT' THEN 1 END) * 100.0 / COUNT(*) as attendance_pct
    FROM "Attendance" a
    JOIN "Student" s ON a.student_id = s.id
    GROUP BY s.name
